name: yks_biyoloji_atlas
description: YKS İnteraktif Biyoloji Atlası - HARGET Mobil Birimi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend & Data
  supabase_flutter: ^2.5.0
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # UI & Animation
  flutter_svg: ^2.0.10
  rive: ^0.13.0
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.0.0

  # Utils
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0

  # Data Classes
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/diagrams/
    - .env
